name: xDrip Fetch & Deploy
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'
env:
  S3_PATH: loop_phone/app/xDrip-plus.apk
  S3_APK_URL: https://object.mk-devices.ovh/loop_phone/app/xDrip-plus.apk

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest xDrip release
        id: get_tag
        run: |
          D=$(curl -s "https://api.github.com/repos/NightscoutFoundation/xDrip/releases")
          echo "tag=$(echo "$D" | jq -r '.[0].tag_name')" >> $GITHUB_OUTPUT
          echo "release_name=$(echo "$D" | jq -r '.[0].name')" >> $GITHUB_OUTPUT
          echo "url=$(echo "$D" | jq -r '.[0].assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)" >> $GITHUB_OUTPUT

      - name: Check if already up to date
        id: check
        run: |
          C=$(curl -s "https://suceret-32936-default-rtdb.firebaseio.com/%D7%9E%D7%A2%D7%A8%D7%9B%D7%AA%20%D7%A0%D7%99%D7%94%D7%95%D7%9C%20%D7%A1%D7%95%D7%9B%D7%A8%D7%AA/XDRIP.json")
          if [[ "$C" == *"${{ steps.get_tag.outputs.tag }}"* ]] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Download & upload to S3
        if: steps.check.outputs.skip == 'false'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET }}
        run: |
          curl -L -o xDrip.apk "${{ steps.get_tag.outputs.url }}"
          aws s3 cp xDrip.apk s3://${{ secrets.S3_BUCKET }}/${{ env.S3_PATH }} \
            --endpoint-url https://eu2.contabostorage.com --acl public-read

      - name: Update Firebase XDRIP tag
        if: steps.check.outputs.skip == 'false'
        env:
          TAG: ${{ steps.get_tag.outputs.tag }}
          RELEASE_NAME: ${{ steps.get_tag.outputs.release_name }}
        run: |
          python3 << 'PYEOF'
          import requests, os

          TAG = os.environ['TAG']
          RELEASE_NAME = os.environ['RELEASE_NAME']
          URL = "https://suceret-32936-default-rtdb.firebaseio.com/%D7%9E%D7%A2%D7%A8%D7%9B%D7%AA%20%D7%A0%D7%99%D7%94%D7%95%D7%9C%20%D7%A1%D7%95%D7%9B%D7%A8%D7%AA/XDRIP.json"

          stored = requests.get(URL).json() or ""
          clean = stored
          if isinstance(clean, str) and clean.startswith('"') and clean.endswith('"') and len(clean) > 1:
              clean = clean[1:-1]

          lines = clean.split("\\n") if "\\n" in clean else (clean.splitlines() or [""])
          display = RELEASE_NAME if RELEASE_NAME else TAG
          lines[0] = f"גירסה זמינה: {display} (מתעדכן אוטומטית כשיש עדכון חדש)"
          new_value = '"' + "\\n".join(lines) + '"'
          requests.put(URL, json=new_value)
          PYEOF

      - name: Update Firebase xdrip config
        if: steps.check.outputs.skip == 'false'
        env:
          TAG: ${{ steps.get_tag.outputs.tag }}
          RELEASE_NAME: ${{ steps.get_tag.outputs.release_name }}
        run: |
          DISPLAY="${{ steps.get_tag.outputs.release_name }}"
          [ -z "$DISPLAY" ] && DISPLAY="${{ steps.get_tag.outputs.tag }}"
          jq -n \
            --arg v "${{ steps.get_tag.outputs.tag }}" \
            --arg n "$DISPLAY" \
            '{"version": $v, "version_name": $n}' | \
          curl -X PUT \
            "https://suceret-32936-default-rtdb.firebaseio.com/xdrip.json" \
            -H "Content-Type: application/json" \
            --data-binary @-

      - name: Update S3 version.json
        if: steps.check.outputs.skip == 'false'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET }}
        run: |
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/aaps/version.json /tmp/version.json \
            --endpoint-url https://eu2.contabostorage.com 2>/dev/null || echo '{}' > /tmp/version.json
          RELEASE_NAME="${{ steps.get_tag.outputs.release_name }}"
          [ -z "$RELEASE_NAME" ] && RELEASE_NAME="${{ steps.get_tag.outputs.tag }}"
          jq --arg v "${{ steps.get_tag.outputs.tag }}" \
             --arg n "$RELEASE_NAME" \
             --arg u "${{ env.S3_APK_URL }}" \
             --arg d "$(date +'%d/%m/%Y')" \
             '.xdrip = {"name": "xDrip+", "version": $v, "version_name": $n, "url": $u, "updated": $d}' \
             /tmp/version.json > /tmp/version_new.json
          aws s3 cp /tmp/version_new.json s3://${{ secrets.S3_BUCKET }}/aaps/version.json \
            --endpoint-url https://eu2.contabostorage.com --acl public-read \
            --content-type application/json

      - name: Update Loop Phone app catalog version
        if: steps.check.outputs.skip == 'false'
        run: |
          RELEASE_NAME="${{ steps.get_tag.outputs.release_name }}"
          [ -z "$RELEASE_NAME" ] && RELEASE_NAME="${{ steps.get_tag.outputs.tag }}"
          curl -s -X POST "https://loop.mk-devices.ovh/fn/setAppVersion" \
            -H "Content-Type: application/json" \
            -d "{\"secret\":\"mk-deploy-2026\",\"pkg\":\"com.eveningoutpost.dexdrip\",\"version\":\"${{ steps.get_tag.outputs.tag }}\",\"version_name\":\"$RELEASE_NAME\",\"link\":\"${{ env.S3_APK_URL }}\"}"

      - name: Send email notification
        if: steps.check.outputs.skip == 'false'
        run: |
          RELEASE_NAME="${{ steps.get_tag.outputs.release_name }}"
          [ -z "$RELEASE_NAME" ] && RELEASE_NAME="${{ steps.get_tag.outputs.tag }}"
          curl -s -X POST "https://mk-mailer.3140197.workers.dev" \
            -H "Content-Type: application/json" \
            -H "X-Auth-Key: 0b5f506d3981262d154bcfb5ad902b6557577447beaf0761" \
            -d "{\"to\":\"8461950@gmail.com\",\"subject\":\"✅ xDrip Updated\",\"body\":\"xDrip עודכן ב-S3 ובפיירבייס לגרסה $RELEASE_NAME (${{ steps.get_tag.outputs.tag }}).\"}"
