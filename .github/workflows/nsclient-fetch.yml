name: NSClient Fetch & Deploy
on:
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - id: get_tag
        run: |
          D=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/nightscout/AndroidAPS/releases/latest)
          echo "tag=$(echo "$D" | jq -r .tag_name)" >> $GITHUB_OUTPUT
          echo "url=$(echo "$D" | jq -r '.assets[] | select(.name | test("^app-aapsclient-release_.*\\.apk$")) | .browser_download_url' | head -n 1)" >> $GITHUB_OUTPUT
      - id: check
        run: |
          C=$(curl -s "https://suceret-32936-default-rtdb.firebaseio.com/%D7%9E%D7%A2%D7%A8%D7%9B%D7%AA%20%D7%A0%D7%99%D7%94%D7%95%D7%9C%20%D7%A1%D7%95%D7%9B%D7%A8%D7%AA/nsclient.json")
          if [[ "$C" == *"${{ steps.get_tag.outputs.tag }}"* ]] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - if: steps.check.outputs.skip == 'false'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET }}
        run: |
          curl -L -o NSClient.apk "${{ steps.get_tag.outputs.url }}"
          aws s3 cp NSClient.apk s3://${{ secrets.S3_BUCKET }}/aaps/AAPSclient.apk --endpoint-url https://eu2.contabostorage.com --acl public-read
      - if: steps.check.outputs.skip == 'false'
        run: |
          T="גירסה זמינה: ${{ steps.get_tag.outputs.tag }}\nעודכן בתאריך: $(date +'%d/%m/%Y')"
          jq -n --arg v "\"$T\"" '$v' | curl -X PUT \
            "https://suceret-32936-default-rtdb.firebaseio.com/%D7%9E%D7%A2%D7%A8%D7%9B%D7%AA%20%D7%A0%D7%99%D7%94%D7%95%D7%9C%20%D7%A1%D7%95%D7%9B%D7%A8%D7%AA/nsclient.json" \
            -H "Content-Type: application/json" --data-binary @-
      - name: Update S3 version.json
        if: steps.check.outputs.skip == 'false'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET }}
        run: |
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/aaps/version.json /tmp/version.json \
            --endpoint-url https://eu2.contabostorage.com 2>/dev/null || echo '{}' > /tmp/version.json
          jq --arg v "${{ steps.get_tag.outputs.tag }}" \
             --arg u "https://object.mk-devices.ovh/aaps/AAPSclient.apk" \
             --arg d "$(date +'%d/%m/%Y')" \
             '.nsclient = {"name": "NSClient / AAPSClient", "version": $v, "url": $u, "updated": $d}' \
             /tmp/version.json > /tmp/version_new.json
          aws s3 cp /tmp/version_new.json s3://${{ secrets.S3_BUCKET }}/aaps/version.json \
            --endpoint-url https://eu2.contabostorage.com --acl public-read \
            --content-type application/json
      - if: steps.check.outputs.skip == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ NSClient Updated"
          body: "NSClient עודכן ב-S3 ובפיירבייס."
          to: "8461950@gmail.com"
          from: "AAPS Automation <${{ secrets.MAIL_USERNAME }}>"
